default_frequency: 30
# Exposure and white balance use Isaac Sim's deterministic neutral defaults.
# The documented setup uses sufficient normal room light, not a studio grade.
annotator:
  common:
    enabled: true
    rgb_capture:
      type: rgb
      device: cpu
  cam_head:
    enabled: true
    rgb_capture:
      type: rgb
      device: cpu
  cam_left_wrist:
    enabled: true
    rgb_capture:
      type: rgb
      device: cpu
  cam_right_wrist:
    enabled: true
    rgb_capture:
      type: rgb
      device: cpu

cam_head:
  camera:
    type: openarm_base
    mesh: pinhole
    # Fafeicy HBV-1716WA / OV2710. The camera is attached to the bimanual
    # center frame, not the ARX freestanding camera stand. Position and
    # orientation are expressed in the OpenARM body-link frame.
    sensor_model: Fafeicy_HBV-1716WA_OV2710
    mount_link: robot0/openarm_body_link
    mount_basis: bimanual_centerline_extrusion_from_robot_root
    # Derived in the robot-root frame from the bimanual extrusion/root pose:
    # world centerline (0, -0.45, 1.40), root (0, -0.48, 0.78), Rz(+90°).
    # This is a structural scene measurement, not an episode-image fit.
    pos: [0.03, 0.0, 0.62]
    # q_local = inverse(q_root) * q_centerline_world. Quaternion form avoids
    # an intrinsic-Euler composition ambiguity at the +90° root rotation.
    ori: [0.65790457, 0.25915550, -0.25915550, -0.65790457]
    lens_distortion_model: opencvFisheye
    # Tiled Replicator output in Isaac Sim 5.1 is black with the native
    # OpenCV-fisheye schema. Render a calibrated backing pinhole and apply the
    # same equidistant model deterministically to captured RGB instead.
    projection_backend: pinhole_postprocess
    published_diagonal_fov_deg: 140.0
    cx: 320.0
    cy: 240.0
    # OpenCV fisheye uses an equidistant projection. Focal pixels come from
    # 0.5*hypot(640,480)/radians(70 degrees).
    fx: 327.4042
    fy: 327.4042
    # The product specification does not publish calibrated coefficients.
    distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
