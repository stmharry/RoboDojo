default_frequency: 30
annotator:
  common:
    enabled: true
    rgb_capture: {type: rgb, device: cpu}

camera_rig:
  profile_id: openarm_dyna
  cameras:
    cam_head:
      role: base
      type: openarm_base
      mesh: pinhole
      sensor:
        vendor: Waveshare
        model: OV2710_2MP_USB_Camera_A_SKU_14121
        native_resolution: [1920, 1080]
        stream_resolution: [640, 480]
        fps: 30
        diagonal_fov_deg: 145.0
      mount:
        kind: scene_fixture
        target: camera_stand
        position: [0.0, -0.543, 0.060]
        orientation: [120.0, 0.0, 0.0]
        optical_roll_deg: 180.0
        basis: upstream_camera_stand_tip
      projection:
        model: opencvFisheye
        backend: pinhole_postprocess
        cx: 320.0
        cy: 240.0
        fx: 316.1146
        fy: 316.1146
        distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
    cam_left_wrist:
      role: left_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: &wrist_sensor
        vendor: Arducam
        model: IMX708_102deg_fixed_focus
        native_resolution: [4608, 2592]
        stream_resolution: [1280, 720]
        fps: 30
        diagonal_fov_deg: 102.0
      mount:
        kind: robot_link
        target: robot0/openarm_left_link7
        position: [0.0, 0.0, 0.12]
        orientation: [180.0, 0.0, 0.0]
        optical_roll_deg: -90.0
        basis: end_effector_contact_axis
      projection: &wrist_projection
        model: opencvFisheye
        backend: pinhole_postprocess
        cx: 640.0
        cy: 360.0
        fx: 824.9654
        fy: 824.9654
        distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
    cam_right_wrist:
      role: right_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: *wrist_sensor
      mount:
        kind: robot_link
        target: robot0/openarm_right_link7
        position: [0.0, 0.0, 0.12]
        orientation: [180.0, 0.0, 0.0]
        optical_roll_deg: 90.0
        basis: end_effector_contact_axis
      projection: *wrist_projection
