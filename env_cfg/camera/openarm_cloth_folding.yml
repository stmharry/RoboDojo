default_frequency: 30
annotator: &annotators
  common:
    enabled: true
    rgb_capture: {type: rgb, device: cpu}

camera_rig:
  profile_id: openarm_policy_original
  cameras:
    cam_head:
      role: base
      type: openarm_base
      mesh: pinhole
      sensor:
        vendor: Fafeicy
        model: OV2710
        native_resolution: [1920, 1080]
        stream_resolution: [640, 480]
        fps: 30
        diagonal_fov_deg: 140.0
      mount:
        kind: scene_fixture
        target: camera_stand
        # Optical center derived from the pinned head-holder CAD. The holder
        # hangs from the upstream stand tip; its lens normal is 20 degrees down.
        position: [0.0, -0.31855376, 0.05106626]
        orientation: [120.0, 0.0, 0.0]
        optical_roll_deg: 180.0
        basis: lerobot_head_camera_holder_v4_optical_frame
        hardware:
          asset: Robots/openarm/head_camera_holder.usd
          position: [0.0, -0.5875, 0.0647]
          orientation: [10.0, 0.0, 0.0]
          collision: true
      projection:
        model: opencvFisheye
        backend: pinhole_postprocess
        cx: 320.0
        cy: 240.0
        fx: 327.4045
        fy: 327.4045
        distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
    cam_left_wrist: &left_wrist
      role: left_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: &wrist_sensor
        vendor: Arducam
        model: IMX708_102deg_fixed_focus
        native_resolution: [4608, 2592]
        stream_resolution: [1280, 720]
        fps: 30
        diagonal_fov_deg: 102.0
      mount:
        kind: robot_link
        target: robot0/left_wrist_camera_holder
        position: [0.05, 0.0, 0.12]
        orientation: [180.0, 0.0, 90.0]
        optical_roll_deg: -90.0
        basis: lerobot_arducam_holder_optical_frame
        hardware:
          asset: Robots/openarm/left_wrist_camera_holder.usd
          position: [0.0, 0.0, 0.0]
          orientation: [0.0, 0.0, 180.0]
          collision: true
      projection: &wrist_projection
        model: opencvFisheye
        backend: pinhole_postprocess
        cx: 640.0
        cy: 360.0
        fx: 824.9654
        fy: 824.9654
        distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
    cam_right_wrist:
      role: right_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: *wrist_sensor
      mount:
        kind: robot_link
        target: robot0/right_wrist_camera_holder
        position: [0.035, 0.0, 0.12]
        orientation: [180.0, 0.0, 90.0]
        optical_roll_deg: 90.0
        basis: lerobot_arducam_holder_optical_frame
        hardware:
          asset: Robots/openarm/right_wrist_camera_holder.usd
          position: [0.0, 0.0, 0.0]
          orientation: [0.0, 0.0, 180.0]
          collision: true
      projection: *wrist_projection
