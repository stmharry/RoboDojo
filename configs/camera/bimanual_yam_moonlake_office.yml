default_frequency: 30
annotator:
  common:
    enabled: true
    rgb_capture: {type: rgb, device: cpu}

camera_rig:
  profile_id: bimanual_yam_moonlake_office
  cameras:
    cam_head:
      role: top
      type: yam_top
      mesh: pinhole
      sensor:
        vendor: Intel
        model: RealSense_D435i
        native_resolution: [640, 480]
        stream_resolution: [640, 480]
        fps: 30
        diagonal_fov_deg: 81.75506480280897
      mount:
        kind: scene_fixture
        target: moonlake_office_fixture
        frame: Mounts/D435OpticalFrame
        position: [0.0, 0.0, 0.0]
        orientation: [1.0, 0.0, 0.0, 0.0]
        pose_convention: isaac_usd
        optical_roll_deg: 0.0
        near_clip_m: 0.1
        basis: moonlake_office_source_a52ae9c
      projection: &head_projection
        model: pinhole
        backend: native
        cx: 320.0
        cy: 240.0
        fx: 462.1386898729645
        fy: 462.1386898729645
        horizontal_fov_deg: 69.4
    cam_left_wrist: &wrist
      role: left_wrist
      type: yam_wrist
      mesh: pinhole
      sensor: &wrist_sensor
        vendor: Intel
        model: RealSense_D405
        native_resolution: [640, 480]
        stream_resolution: [640, 480]
        fps: 30
        diagonal_fov_deg: 99.7366081859878
      mount:
        kind: robot_link
        target: robot0/wrist_camera_mount
        position: [0.0, 0.09, 0.06]
        orientation: [0.61237243, -0.35355339, -0.35355340, -0.61237244]
        pose_convention: sapien_robotics
        optical_roll_deg: 0.0
        basis: yam_simulation_camera_contract_v1
        calibration_correction:
          translation_m: [0.0003368883833682653, -0.003866168248125935, 0.005781196674983154]
          rotation_rotvec_deg: [-1.5213745097970042, 0.2893656817085859, 0.672802376740453]
          source: yam_hardware_calibration_v1
        hardware: &wrist_hardware
          enabled: true
          asset: Robots/yam/D405_proxy_moonlake_office.usd
          collision: false
          camera_frame: OpticalFrame
      projection: &wrist_projection
        model: pinhole
        backend: native
        cx: 320.0
        cy: 240.0
        fx: 337.20964008990796
        fy: 337.20964008990796
        horizontal_fov_deg: 87.0
    cam_right_wrist:
      <<: *wrist
      role: right_wrist
      sensor: *wrist_sensor
      mount:
        kind: robot_link
        target: robot1/wrist_camera_mount
        position: [0.0, 0.09, 0.06]
        orientation: [0.61237243, -0.35355339, -0.35355340, -0.61237244]
        pose_convention: sapien_robotics
        optical_roll_deg: 0.0
        basis: yam_simulation_camera_contract_v1
        calibration_correction:
          translation_m: [-0.0003081117949818329, -0.003900024586207093, 0.0057492578421972276]
          rotation_rotvec_deg: [-1.9193526354538613, 0.01345363932629845, -0.5723172103038849]
          source: yam_hardware_calibration_v1
        hardware: *wrist_hardware
      projection: *wrist_projection
