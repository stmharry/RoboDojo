urdf_path: openarm.urdf
base_link: openarm_body_link
left:
  ee_joints: openarm_left_joint7
  ee_link: openarm_left_link7
  arm_joints_name:
    - openarm_left_joint1
    - openarm_left_joint2
    - openarm_left_joint3
    - openarm_left_joint4
    - openarm_left_joint5
    - openarm_left_joint6
    - openarm_left_joint7
  gripper_joints_name: [openarm_left_finger_joint1, openarm_left_finger_joint2]
  gripper_move:
    base: openarm_left_finger_joint1
    sign: 1.0
    mimic: [openarm_left_finger_joint2, 1.0, 0.0]
  gripper_scale: [0.0, 0.044]
  physical_gripper_interface: true
  camera:
    - link: openarm_left_link7
      name: cam_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor_model: Arducam_IMX708_102deg_fixed_focus
      mount_basis: end_effector_contact_axis
      # Link origin lies inside the wrist shell; the documented direct mount's
      # optical center clears the shell at +0.12 m on the contact axis while
      # retaining the jaws at the image periphery.
      pos: [0.0, 0.0, 0.12]
      ori: [180.0, 0.0, 0.0]
      lens_distortion_model: opencvFisheye
      projection_backend: pinhole_postprocess
      published_diagonal_fov_deg: 102.0
      cx: 640.0
      cy: 360.0
      # Equidistant focal pixels from the published 102-degree diagonal FOV.
      fx: 824.9654
      fy: 824.9654
      distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
right:
  ee_joints: openarm_right_joint7
  ee_link: openarm_right_link7
  arm_joints_name:
    - openarm_right_joint1
    - openarm_right_joint2
    - openarm_right_joint3
    - openarm_right_joint4
    - openarm_right_joint5
    - openarm_right_joint6
    - openarm_right_joint7
  gripper_joints_name: [openarm_right_finger_joint1, openarm_right_finger_joint2]
  gripper_move:
    base: openarm_right_finger_joint1
    sign: 1.0
    mimic: [openarm_right_finger_joint2, 1.0, 0.0]
  gripper_scale: [0.0, 0.044]
  physical_gripper_interface: true
  camera:
    - link: openarm_right_link7
      name: cam_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor_model: Arducam_IMX708_102deg_fixed_focus
      mount_basis: end_effector_contact_axis
      pos: [0.0, 0.0, 0.12]
      ori: [180.0, 0.0, 0.0]
      lens_distortion_model: opencvFisheye
      projection_backend: pinhole_postprocess
      published_diagonal_fov_deg: 102.0
      cx: 640.0
      cy: 360.0
      fx: 824.9654
      fy: 824.9654
      distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
