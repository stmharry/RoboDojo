sources:
  i2rt:
    repository: https://github.com/i2rt-robotics/i2rt.git
    revision: ac096928d6899ddf852a71c5e8fbaa6055cd9745
    license: MIT
    license_path: LICENSE
  molmoact2_sim_assets:
    repository: https://huggingface.co/datasets/TreeePlanter/molmoact2-sim-eval-assets
    revision: 9332a64224ff0a813d9f77bd377b845270232513
    license: undeclared
    usage: reference_only
    derivation: register the shared gripper mesh to recover the pose-invariant link_6 frame
    files:
      bimanual_model:
        path: assets/yam/yam_mujoco/bimanual_yam_linear_flattened.xml
        sha256: 459f1801fae5618e7caf3c44f257a53d61974e7708a14d83c7b60a60b65e374a
      gripper_mesh:
        path: assets/yam/yam_mujoco/assets/gripper_linear.obj
        sha256: 31d70e2129a3ab8e85f391785cae5bba4163e1e16fb02a3988c5ac1c549c9d78

asset:
  arm_urdf: i2rt/robot_models/arm/yam/yam.urdf
  arm_meshes: i2rt/robot_models/arm/yam/assets
  gripper_meshes: i2rt/robot_models/gripper/linear_3507/assets
  derived_urdf: YAM.urdf
  output: YAM.usd
  transformations:
    - normalize_package_mesh_paths
    - source_linear_3507_gripper_meshes
    - convert_zero_range_dof_joint0_to_fixed
    - set_finger_limits_to_negative_47_5_mm
    - add_convex_hull_collisions_from_visuals
    - add_reference_only_molmo_link6_frame
  fixed_frames:
    - name: molmo_link6
      parent: gripper
      position: [0.0, 0.0, 0.0005]
      orientation: [0.0, 0.7071067811865476, -0.7071067811865476, 0.0]
      derivation_source: molmoact2_sim_assets
      physical: false
  converter:
    fix_base: true
    merge_fixed_joints: false
    make_instanceable: false
    collision_from_visuals: false
    collider_type: convex_hull
    self_collision: false

robot_config:
  urdf_path: YAM.urdf
  ee_joints: dof_joint6
  ee_link: gripper
  ee_type: gripper
  base_link: base
  arm_joints_name: [dof_joint1, dof_joint2, dof_joint3, dof_joint4, dof_joint5, dof_joint6]
  gripper_joints_name: [dof_joint7, dof_joint8]
  save_gripper_joints_name:
    [dof_joint1, dof_joint2, dof_joint3, dof_joint4, dof_joint5, dof_joint6, dof_joint7, dof_joint8]
  gripper_move:
    base: dof_joint7
    sign: -1.0
    mimic: [dof_joint8, 1.0, 0.0]
  gripper_bias: 0.0
  gripper_scale: [-0.0475, 0.0]
  delta_matrix: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]
  global_trans_matrix: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]
  grasp_camera_reference_axis: [1, 0, 0]
  camera_mount_links:
    link6: gripper/molmo_link6

physics_contract:
  arm:
    stiffness: [40.0, 40.0, 40.0, 20.0, 10.0, 10.0]
    damping: [2.5, 2.5, 2.5, 0.5, 1.0, 1.0]
    effort_limit: [28.0, 28.0, 28.0, 10.0, 10.0, 10.0]
  gripper:
    stiffness: 2000.0
    damping: 40.0
    effort_limit: 40.0
    static_friction: 3.0
    dynamic_friction: 2.5
