sources:
  i2rt:
    repository: https://github.com/i2rt-robotics/i2rt.git
    revision: ac096928d6899ddf852a71c5e8fbaa6055cd9745
    license: MIT
    license_path: LICENSE
  historical_camera_mount_reference:
    repository: https://huggingface.co/datasets/TreeePlanter/molmoact2-sim-eval-assets
    revision: 9332a64224ff0a813d9f77bd377b845270232513
    license: undeclared
    usage: reference_only
    derivation: register the shared gripper mesh to recover the pose-invariant link_6 frame
    files:
      bimanual_model:
        path: assets/yam/yam_mujoco/bimanual_yam_linear_flattened.xml
        sha256: 459f1801fae5618e7caf3c44f257a53d61974e7708a14d83c7b60a60b65e374a
      gripper_mesh:
        path: assets/yam/yam_mujoco/assets/gripper_linear.obj
        sha256: 31d70e2129a3ab8e85f391785cae5bba4163e1e16fb02a3988c5ac1c549c9d78
  hardware_appearance_reference:
    repository: https://huggingface.co/datasets/allenai/MolmoAct2-BimanualYAM-Dataset
    revision: e9f21ae15074330839f2ac25ed4b49d76dfa1f9c
    license: Apache-2.0
    usage: reference_only
    derivation: visually match coarse YAM link colors from public top and wrist RGB training frames
    inspected_modalities:
      - observation.images.top
      - observation.images.left
      - observation.images.right
  realsense_d405:
    product_page: https://www.realsenseai.com/products/stereo-depth-camera-d405/
    datasheet: https://realsenseai.com/wp-content/uploads/dlm_uploads/2025/08/Intel-RealSense-D400-Series-Datasheet-August-2025.pdf
    datasheet_revision: "017"
    usage: geometry_reference
    nominal_dimensions_m:
      width: 0.042
      height: 0.042
      depth: 0.023

asset:
  arm_urdf: i2rt/robot_models/arm/yam/yam.urdf
  arm_meshes: i2rt/robot_models/arm/yam/assets
  gripper_meshes: i2rt/robot_models/gripper/linear_3507/assets
  derived_urdf: YAM.urdf
  output: YAM.usd
  transformations:
    - normalize_package_mesh_paths
    - source_linear_3507_gripper_meshes
    - convert_zero_range_dof_joint0_to_fixed
    - set_finger_limits_to_negative_47_5_mm
    - add_convex_hull_collisions_from_visuals
    - add_reference_only_wrist_camera_mount_frame
    - author_yam_hardware_preview_materials
    - author_nonphysical_d405_visual_proxy
  fixed_frames:
    - name: wrist_camera_mount
      parent: gripper
      position: [0.0, 0.0, 0.0005]
      orientation: [0.0, 0.7071067811865476, -0.7071067811865476, 0.0]
      derivation_source: historical_camera_mount_reference
      physical: false
  visual_proxies:
    d405:
      output: D405_proxy.usd
      default_prim: D405
      optical_frame: OpticalFrame
      provenance_source: realsense_d405
      dimensions_m: [0.042, 0.042, 0.023]
      housing_material: light_gray
      detail_material: charcoal
      physical: false
  converter:
    fix_base: true
    merge_fixed_joints: false
    make_instanceable: false
    collision_from_visuals: false
    collider_type: convex_hull
    self_collision: false

appearance:
  derivation_source: hardware_appearance_reference
  shader: UsdPreviewSurface
  color_space: linear_rgb
  material_scope: Looks
  palette:
    charcoal:
      diffuse_color: [0.03, 0.035, 0.04]
      roughness: 0.72
      metallic: 0.0
      opacity: 1.0
    off_white:
      diffuse_color: [0.78, 0.80, 0.82]
      roughness: 0.58
      metallic: 0.0
      opacity: 1.0
    light_gray:
      diffuse_color: [0.52, 0.55, 0.58]
      roughness: 0.62
      metallic: 0.0
      opacity: 1.0
  link_materials:
    base: charcoal
    link1: charcoal
    link2: off_white
    link3: light_gray
    link4: charcoal
    link5: charcoal
    gripper: charcoal
    tip_left: charcoal
    tip_right: charcoal

robot_config:
  urdf_path: YAM.urdf
  ee_joints: dof_joint6
  ee_link: gripper
  ee_type: gripper
  base_link: base
  arm_joints_name: [dof_joint1, dof_joint2, dof_joint3, dof_joint4, dof_joint5, dof_joint6]
  gripper_joints_name: [dof_joint7, dof_joint8]
  save_gripper_joints_name:
    [dof_joint1, dof_joint2, dof_joint3, dof_joint4, dof_joint5, dof_joint6, dof_joint7, dof_joint8]
  gripper_move:
    base: dof_joint7
    sign: -1.0
    mimic: [dof_joint8, 1.0, 0.0]
  gripper_bias: 0.0
  gripper_scale: [-0.0475, 0.0]
  delta_matrix: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]
  global_trans_matrix: [[1, 0, 0], [0, 1, 0], [0, 0, 1]]
  grasp_camera_reference_axis: [1, 0, 0]
  camera_mount_links:
    wrist_camera_mount: gripper/wrist_camera_mount

physics_contract:
  arm:
    stiffness: [40.0, 40.0, 40.0, 20.0, 10.0, 10.0]
    damping: [2.5, 2.5, 2.5, 0.5, 1.0, 1.0]
    effort_limit: [28.0, 28.0, 28.0, 10.0, 10.0, 10.0]
  gripper:
    stiffness: 2000.0
    damping: 40.0
    effort_limit: 40.0
    static_friction: 3.0
    dynamic_friction: 2.5
