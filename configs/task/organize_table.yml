    category:
      -
        name: "cube_cushion"
        index: [2]

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["cube_cushion"]

  -
    common:
      xlim: [-0.05, 0.15]
      ylim: [0.2, 0.25]
      rotate_rand: False
      relative_plane: "Table"

    category:
      -
        name: "monitor"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["monitor"]
  -
    common:
      xlim: [0.35, 0.50]
      ylim: [-0.1, 0.05]
      rotate_rand: False
      relative_plane: "Table"

    category:
      -
        name: "mousemat"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["mousemat"]

  -
    common:
      xlim: [0.10, 0.10]
      ylim: [0.0, 0.0]
