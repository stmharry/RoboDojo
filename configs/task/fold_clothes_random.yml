Garment:
  -
    common:
      xlim: [-0.02, 0.02]
      ylim: [-0.25, -0.18]
      rotate_deg: 25
      rotate_rand: True
      relative_plane: "Table"

    category:
      -
        name: "Top_Long"
        index: [6, 7, 11]

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["target"]

Clutter:
  -
    xlim: [[-0.6, 0.6]]
    ylim: [[-0.5, 0.5]]
    relative_plane: "Table"
    yaml_path: "Clutter/clutter.yml"
    nums: 20
    mode: "category_unique" # allow_duplicate (default), unique, category_unique
    rotate_rand: True
    rotate_deg: 30
    margin: 0.015

ProhibitedArea:
  -
    [-0.35, -0.5, 0.35, -0.4]