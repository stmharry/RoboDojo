      rotate_rand: False
      relative_plane: "Table"

    category:
      -
        name: "keyboard"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["keyboard"]
  -
    common:
      xlim: [-0.45, 0.0]
      ylim: [-0.3, 0.05]
      rotate_rand: True
      rotate_deg: 45
      relative_plane: "Table"
