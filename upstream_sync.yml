      - {kind: exact, upstream: scripts/robodojo.sh, local: src/robodojo/cli.py, disposition: replaced}
  xpolicylab:
    repository: https://github.com/XPolicyLab/XPolicyLab.git
    ref: main
    reviewed_commit: fe71eb54675cef495fea817a637386a4f4529153
    mappings:
      - {kind: prefix, upstream: policy/, local: XPolicyLab/policy/, disposition: submodule-owned}
      - {kind: prefix, upstream: client_server/, local: XPolicyLab/client_server/, disposition: submodule-owned}
      - {kind: prefix, upstream: utils/, local: XPolicyLab/utils/, disposition: submodule-owned}
      - {kind: exact, upstream: XPolicyLab.py, local: XPolicyLab/XPolicyLab.py, disposition: submodule-owned}
      - {kind: exact, upstream: model_template.py, local: XPolicyLab/model_template.py, disposition: submodule-owned}
      - {kind: exact, upstream: setup_policy_server.py, local: XPolicyLab/setup_policy_server.py, disposition: submodule-owned}
      - {kind: exact, upstream: pyproject.toml, local: XPolicyLab/pyproject.toml, disposition: submodule-owned}
      - {kind: exact, upstream: README.md, local: XPolicyLab/README.md, disposition: submodule-owned}
      - {kind: exact, upstream: LICENSE, local: XPolicyLab/LICENSE, disposition: submodule-owned}
intentional_divergences:
  - The root package, typed CLI, and uv workflows replace upstream shell orchestration.
  - Storage, scene export, normalized camera rigs, calibration profiles, and OpenArm are additive local concepts.
  - The XPolicyLab gitlink c643d36480cd2be94f391198f0f29888cc606cce extends the reviewed official commit with the OpenArm policy adapter.
