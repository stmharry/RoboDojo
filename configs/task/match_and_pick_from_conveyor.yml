Dynamic:
  -
    common:
      xlim: [-2.08, -2.08] # spawn range
      ylim: [0.175, 0.175]
      zlim: [0.0, 0.0] # zlim is required when using qpos
      rotate_deg: 0
      rotate_rand: True

      relative_plane: "Ground"
      qpos: [0, 0, 0, 1]

    category:
      -
        name: "conveyor" # asset name
        index: [0]

    select_mode:
      nums: 1 # spawn count
      mode: "unique" # asset uniqueness mode: unique, category_unique, allow_duplicate, or same
      label: ["conveyor"] # scene label (unique object name)

