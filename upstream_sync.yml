    ref: main
    reviewed_commit: 9b4cc885e8f530ed3ab14a30a312ae70242771c4
    mappings:
      - {kind: exact, upstream: README.md, local: README.md, disposition: mapped}
      - {kind: exact, upstream: LICENSE, local: LICENSE, disposition: mapped}
      - {kind: exact, upstream: pyproject.toml, local: pyproject.toml, disposition: mapped}
      - {kind: exact, upstream: Dockerfile, local: Dockerfile, disposition: mapped}
      - {kind: exact, upstream: .dockerignore, local: .dockerignore, disposition: mapped}
      - {kind: exact, upstream: .gitignore, local: .gitignore, disposition: mapped}
      - {kind: exact, upstream: .gitmodules, local: .gitmodules, disposition: mapped}
      - {kind: exact, upstream: XPolicyLab, local: XPolicyLab, disposition: submodule-owned}
      - {kind: prefix, upstream: env/, local: src/robodojo/sim/environment/, disposition: mapped}
      - {kind: prefix, upstream: env_cfg/, local: configs/, disposition: mapped}
      - {kind: prefix, upstream: task/RoboDojo/config/, local: task/RoboDojo/config/, disposition: mapped}
      - {kind: prefix, upstream: task/RoboDojo/tasks/, local: src/robodojo/sim/tasks/, disposition: mapped}
