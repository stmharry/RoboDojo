      - {kind: prefix, upstream: src/eval_client/, local: src/robodojo/sim/evaluation/, disposition: mapped}
      - {kind: prefix, upstream: utils/, local: src/robodojo/sim/utils/, disposition: mapped}
      - {kind: prefix, upstream: docker/, local: docker/, disposition: mapped}
